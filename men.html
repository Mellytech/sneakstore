<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNEAK® | Men's Elite Collection</title>
    <meta name="description" content="Explore the elite collection of men's sneakers. Performance, style, and innovation.">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body class="dark-mode">
    
    

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-container">
                <div class="nav-left">
                    <div class="logo">
                        <a href="index.html">SNEAK</a>
                    </div>
                </div>
                <div class="nav-right">
                    <div class="nav-links" id="navLinks">
                        <a href="index.html">Home</a>
                        <a href="men.html" class="active">Men</a>
                        <a href="women.html">Women</a>
                        <a href="kids.html">Kids</a>
                        <a href="new-releases.html">New Releases</a>
                    </div>
                    <div class="nav-actions">
                        <div class="search-container">
                            <input type="text" class="search-input" id="searchInput" placeholder="Search Mens...">
                        </div>
                        <button class="btn-icon" id="wishlistBtn" onclick="toggleWishlist()">
                            ❤️ <span class="badge" id="wishlistBadge">0</span>
                        </button>
                        <button class="btn-icon" id="cartBtn" onclick="toggleCart()">
                            🛒 <span class="badge" id="cartBadge">0</span>
                        </button>
                        <button class="mobile-menu-toggle" id="menuToggle" onclick="toggleMobileMenu()">☰</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="hero category-hero">
        <div class="parallax-hero" id="parallaxHero">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=1920&fit=crop" alt="Men's Background" style="filter: brightness(0.4);">
        </div>
        <div class="container">
            <div class="hero-text">
                <h1 class="hero-title">MEN'S ELITE</h1>
                <p class="hero-subtitle">Performance meets uncompromised style.</p>
            </div>
        </div>
    </section>

    <!-- Products Section -->
    <section class="featured-products" id="featured">
        <div class="container">
            <div class="filter-bar">
                <select id="categoryFilter" class="filter-select">
                    <option value="all">All Categories</option>
                    <option value="running">Running</option>
                    <option value="basketball">Basketball</option>
                    <option value="lifestyle">Lifestyle</option>
                    <option value="training">Training</option>
                </select>
                <select id="priceFilter" class="filter-select">
                    <option value="all">All Prices</option>
                    <option value="0-100">Under $100</option>
                    <option value="100-200">$100 - $200</option>
                    <option value="200-300">$200 - $300</option>
                    <option value="300+">Over $300</option>
                </select>
            </div>
            <div class="products-grid" id="productsGrid">
                <!-- Loaded via script.js -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 SNEAKSTORE. Designed for the Future.</p>
            </div>
        </div>
    </footer>

    <!-- Modals & Sidebars -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="sidebar-header">
            <h3>Cart</h3>
            <button class="close-btn" onclick="toggleCart()">×</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
            <div class="cart-total">Total: <span id="cartTotal">$0.00</span></div>
            <button class="btn btn-primary btn-large" style="width:100%">Checkout</button>
        </div>
    </div>

    <div class="wishlist-sidebar" id="wishlistSidebar">
        <div class="sidebar-header">
            <h3>Wishlist</h3>
            <button class="close-btn" onclick="toggleWishlist()">×</button>
        </div>
        <div class="wishlist-items" id="wishlistItems"></div>
    </div>

    <div class="product-modal" id="productModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeProductModal()">×</button>
            <div class="product-detail" style="display:grid;grid-template-columns:1fr 1fr;gap:40px">
                <div class="product-gallery">
                    <img id="modalMainImage" src="" alt="">
                    <div class="thumbnail-grid" id="thumbnailGrid"></div>
                </div>
                <div class="product-info">
                    <h2 id="modalProductName"></h2>
                    <div class="product-price" id="modalProductPrice"></div>
                    <p id="modalProductDescription" style="color:var(--text-secondary);margin-bottom:20px"></p>
                    <button class="btn btn-primary btn-large" onclick="addToCartFromModal()">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
