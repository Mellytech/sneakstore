<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNEAK® | New Drops & Releases</title>
    <meta name="description" content="Exclusive drops. Limited editions. Be the first to own the future of footwear.">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body class="dark-mode">
    
   

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-container">
                <div class="nav-left">
                    <div class="logo">
                        <a href="index.html">SNEAK</a>
                    </div>
                </div>
                <div class="nav-right">
                    <div class="nav-links" id="navLinks">
                        <a href="index.html">Home</a>
                        <a href="men.html">Men</a>
                        <a href="women.html">Women</a>
                        <a href="kids.html">Kids</a>
                        <a href="new-releases.html" class="active">New Releases</a>
                    </div>
                    <div class="nav-actions">
                        <div class="search-container">
                            <input type="text" class="search-input" id="searchInput" placeholder="Search Drops...">
                        </div>
                        <button class="btn-icon" id="wishlistBtn" onclick="toggleWishlist()">
                            ❤️ <span class="badge" id="wishlistBadge">0</span>
                        </button>
                        <button class="btn-icon" id="cartBtn" onclick="toggleCart()">
                            🛒 <span class="badge" id="cartBadge">0</span>
                        </button>
                        <button class="mobile-menu-toggle" id="menuToggle" onclick="toggleMobileMenu()">☰</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="hero category-hero">
        <div class="parallax-hero" id="parallaxHero">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=1920&fit=crop" alt="Global Release" style="filter: brightness(0.3);">
        </div>
        <div class="container">
            <div class="hero-text" style="max-width: 100%; text-align: center;">
                <h1 class="hero-title">NEXT DROP</h1>
                <div id="countdown" style="display: flex; justify-content: center; gap: 30px; margin: 40px 0;">
                    <div class="countdown-item" style="background: var(--glass-bg); padding: 20px; border-radius: var(--radius-md); border: 1px solid var(--glass-border); min-width: 100px;">
                        <span id="days" style="display: block; font-size: 40px; font-weight: 800; font-family: 'Bebas Neue';">00</span>
                        <span style="font-size: 12px; color: var(--text-secondary); text-transform: uppercase;">Days</span>
                    </div>
                    <div class="countdown-item" style="background: var(--glass-bg); padding: 20px; border-radius: var(--radius-md); border: 1px solid var(--glass-border); min-width: 100px;">
                        <span id="hours" style="display: block; font-size: 40px; font-weight: 800; font-family: 'Bebas Neue';">00</span>
                        <span style="font-size: 12px; color: var(--text-secondary); text-transform: uppercase;">Hours</span>
                    </div>
                    <div class="countdown-item" style="background: var(--glass-bg); padding: 20px; border-radius: var(--radius-md); border: 1px solid var(--glass-border); min-width: 100px;">
                        <span id="minutes" style="display: block; font-size: 40px; font-weight: 800; font-family: 'Bebas Neue';">00</span>
                        <span style="font-size: 12px; color: var(--text-secondary); text-transform: uppercase;">Mins</span>
                    </div>
                </div>
                <button class="btn btn-primary btn-large">Notify Me</button>
            </div>
        </div>
    </section>

    <!-- Products Section -->
    <section class="featured-products" id="featured">
        <div class="container">
            <h2 class="section-title">Just Landed</h2>
            <div class="filter-bar">
                <select id="categoryFilter" class="filter-select">
                    <option value="all">All Categories</option>
                    <option value="running">Running</option>
                    <option value="lifestyle">Lifestyle</option>
                </select>
                <select id="genderFilter" class="filter-select">
                    <option value="all">All Genders</option>
                    <option value="men">Men</option>
                    <option value="women">Women</option>
                </select>
            </div>
            <div class="products-grid" id="productsGrid">
                <!-- Loaded via script.js -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 SNEAKSTORE. Designed for the Future.</p>
            </div>
        </div>
    </footer>

    <!-- Modals & Sidebars -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="sidebar-header">
            <h3>Cart</h3>
            <button class="close-btn" onclick="toggleCart()">×</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
            <div class="cart-total">Total: <span id="cartTotal">$0.00</span></div>
            <button class="btn btn-primary btn-large" style="width:100%">Checkout</button>
        </div>
    </div>

    <div class="wishlist-sidebar" id="wishlistSidebar">
        <div class="sidebar-header">
            <h3>Wishlist</h3>
            <button class="close-btn" onclick="toggleWishlist()">×</button>
        </div>
        <div class="wishlist-items" id="wishlistItems"></div>
    </div>

    <div class="product-modal" id="productModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeProductModal()">×</button>
            <div class="product-detail" style="display:grid;grid-template-columns:1fr 1fr;gap:40px">
                <div class="product-gallery">
                    <img id="modalMainImage" src="" alt="">
                    <div class="thumbnail-grid" id="thumbnailGrid"></div>
                </div>
                <div class="product-info">
                    <h2 id="modalProductName"></h2>
                    <div class="product-price" id="modalProductPrice"></div>
                    <p id="modalProductDescription" style="color:var(--text-secondary);margin-bottom:20px"></p>
                    <button class="btn btn-primary btn-large" onclick="addToCartFromModal()">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Countdown Timer Logic
        function startCountdown() {
            const now = new Date();
            const nextFriday = new Date(now);
            nextFriday.setDate(now.getDate() + ((5 - now.getDay() + 7) % 7 || 7));
            nextFriday.setHours(9, 0, 0, 0);
            const countDownDate = nextFriday.getTime();

            setInterval(function() {
                const now = new Date().getTime();
                const distance = countDownDate - now;
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

                document.getElementById("days").textContent = String(days).padStart(2, '0');
                document.getElementById("hours").textContent = String(hours).padStart(2, '0');
                document.getElementById("minutes").textContent = String(minutes).padStart(2, '0');
            }, 1000);
        }
        document.addEventListener('DOMContentLoaded', startCountdown);
    </script>
</body>
</html>
